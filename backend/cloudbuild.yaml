steps:
  # Pull previous image to seed the layer cache (|| true so first build doesn't fail)
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - 'docker pull $_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_SERVICE:latest || true'

  # Build the Docker image — reuse cached layers when package.json / source unchanged
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - '--cache-from=$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_SERVICE:latest'
      - '--build-arg=BUILDKIT_INLINE_CACHE=1'
      - '-t'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_SERVICE:$COMMIT_SHA'
      - '-t'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_SERVICE:latest'
      - '.'
    env:
      - 'DOCKER_BUILDKIT=1'

  # Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - '--all-tags'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_SERVICE'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - '$_SERVICE'
      - '--image=$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_SERVICE:$COMMIT_SHA'
      - '--region=$_REGION'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--min-instances=1'
      - '--max-instances=10'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--set-secrets=DATABASE_URL=DATABASE_URL:latest,DIRECT_URL=DIRECT_URL:latest,JWT_SECRET=JWT_SECRET:latest,QB_CLIENT_ID=QB_CLIENT_ID:latest,QB_CLIENT_SECRET=QB_CLIENT_SECRET:latest,QB_WEBHOOK_VERIFIER_TOKEN=QB_WEBHOOK_VERIFIER_TOKEN:latest'
      - '--set-env-vars=NODE_ENV=production,PORT=8080,QB_REDIRECT_URI=https://apex.reloncrm.com/api/quickbooks/callback,QB_ENVIRONMENT=production,FRONTEND_URL=https://apex.reloncrm.com,CORS_ORIGIN=https://apex.reloncrm.com,APEX_BUNDLED_FONTS=1'

substitutions:
  _REGION: us-central1
  _REPO: relon-apex
  _SERVICE: apex-backend

images:
  - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_SERVICE:$COMMIT_SHA'
  - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_SERVICE:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
